server:
  port: 8081

spring:
  application:
    name: auth
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/sentinal_auth?createDatabaseIfNotExist=true}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

sentinal:
  jwt:
    secret: "${JWT_SECRET:KzoAoOXsENdpf0FXSb17D7jtb4c36JFNM0AtpKf0nMg=}"
    expiration-ms: "${JWT_EXPIRATION_MS:86400000}"